name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test -- --watch=false --karma-config=karma.ci.conf.cjs

      - name: Build frontend for production
        working-directory: frontend
        run: npm run build -- --configuration production

  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo, pdo_sqlite
          coverage: none

      - name: Setup Composer cache
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-interaction

      - name: Run backend tests
        working-directory: backend
        run: php artisan test --env=testing

  deploy:
    needs: [frontend-tests, backend-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy frontend to Render
        env:
          SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
          API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl --fail -s -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" -H "Authorization: Bearer ${API_KEY}" -H "Content-Type: application/json" -d '{}'

      - name: Deploy backend to Render
        env:
          SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
          API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl --fail -s -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" -H "Authorization: Bearer ${API_KEY}" -H "Content-Type: application/json" -d '{}'

      - name: Notify deployment
        run: echo "Deployment to Render completed successfully"
