<section class="py-5 bg-body-tertiary">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-3 text-center">Iniciar sesión</h2>

            <form (ngSubmit)="onSubmit()" #f="ngForm">
              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input
                  type="text"
                  class="form-control"
                  name="usuario"
                  [(ngModel)]="modelo.usuario"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input
                  type="password"
                  class="form-control"
                  name="password"
                  [(ngModel)]="modelo.password"
                  required
                />
              </div>

              <button
                class="btn btn-primary w-100"
                [disabled]="f.invalid || cargando">
                {{ cargando ? 'Enviando...' : 'Entrar' }}
              </button>
            </form>

            <p class="mt-3 small text-center" *ngIf="mensaje">
              {{ mensaje }}
            </p>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
