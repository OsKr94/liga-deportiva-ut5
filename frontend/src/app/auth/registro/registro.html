<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-3 text-center">Registro</h2>

            <form (ngSubmit)="onSubmit()" #f="ngForm">
              <div class="mb-3">
                <label class="form-label">Nombre completo</label>
                <input
                  type="text"
                  class="form-control"
                  name="nombre"
                  [(ngModel)]="modelo.nombre"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input
                  type="text"
                  class="form-control"
                  name="usuario"
                  [(ngModel)]="modelo.usuario"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  [(ngModel)]="modelo.email"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input
                  type="password"
                  class="form-control"
                  name="password"
                  [(ngModel)]="modelo.password"
                  required
                />
              </div>

            <div class="mb-3">
  <label class="form-label" for="tipoUsuario">Tipo de usuario</label>
  <select
    id="tipoUsuario"
    name="tipo"
    class="form-select"
    [(ngModel)]="modelo.tipo"
  >
    <option value="normal">Usuario normal</option>
    <option value="admin">Administrador</option>
    <option value="arbitro">Árbitro</option>
    <option value="capitan">Capitán</option>
  </select>
</div>

              <button
                class="btn btn-success w-100"
                [disabled]="f.invalid || cargando">
                {{ cargando ? 'Enviando...' : 'Crear cuenta' }}
              </button>
            </form>

            <p class="mt-3 small text-center" *ngIf="mensaje">
              {{ mensaje }}
            </p>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
